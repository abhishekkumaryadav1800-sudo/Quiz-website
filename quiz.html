<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Master</title>

<style>
body{
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
background:#1e293b;
padding:20px;
border-radius:15px;
}

button{
padding:10px 20px;
margin:10px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

.option{
display:block;
width:100%;
margin:10px 0;
background:#334155;
color:white;
}

#leaderboard{
margin-top:30px;
text-align:left;
}
</style>
</head>
<body>

<div class="container">

<h1>Quiz Master</h1>

<input type="text" id="playerName" placeholder="Enter Your Name">

<div id="quizBox" style="display:none;">
<h2 id="question"></h2>
<div id="options"></div>
<button onclick="nextQuestion()">Next</button>
</div>

<button onclick="startQuiz()">Start Quiz</button>

<h2 id="result"></h2>

<div id="leaderboard">
<h2>🏆 Global Leaderboard</h2>
<ul id="leaderboardList"></ul>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
query,
orderBy,
limit,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "YOUR_API_KEY",

authDomain: "YOUR_AUTH_DOMAIN",

projectId: "YOUR_PROJECT_ID",

storageBucket: "YOUR_STORAGE_BUCKET",

messagingSenderId: "YOUR_SENDER_ID",

appId: "YOUR_APP_ID"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const questions = [

{
q:"What is the capital of India?",
o:["Delhi","Mumbai","Kolkata","Chennai"],
a:"Delhi"
},

{
q:"2 + 2 = ?",
o:["3","4","5","6"],
a:"4"
},

{
q:"HTML stands for?",
o:[
"Hyper Text Markup Language",
"High Text",
"Home Tool",
"Hyper Tool"
],
a:"Hyper Text Markup Language"
},

{
q:"CSS is used for?",
o:[
"Styling",
"Programming",
"Database",
"Hosting"
],
a:"Styling"
},

{
q:"JavaScript runs in?",
o:[
"Browser",
"Notebook",
"Printer",
"Router"
],
a:"Browser"
},

{
q:"India gained independence in?",
o:["1947","1950","1945","1930"],
a:"1947"
},

{
q:"5 x 5 = ?",
o:["20","25","30","15"],
a:"25"
},

{
q:"Largest planet?",
o:["Earth","Mars","Jupiter","Venus"],
a:"Jupiter"
},

{
q:"Who invented C language?",
o:[
"Dennis Ritchie",
"James Gosling",
"Bill Gates",
"Mark"
],
a:"Dennis Ritchie"
},

{
q:"CPU means?",
o:[
"Central Processing Unit",
"Computer Process Unit",
"Central Program Unit",
"None"
],
a:"Central Processing Unit"
},

{
q:"Which is a browser?",
o:["Chrome","Windows","Linux","Excel"],
a:"Chrome"
},

{
q:"1 byte = ? bits",
o:["8","4","16","32"],
a:"8"
},

{
q:"Sun is a?",
o:["Planet","Star","Moon","Comet"],
a:"Star"
},

{
q:"Which language is used in web pages?",
o:["HTML","C","Java","Python"],
a:"HTML"
},

{
q:"Which company made Android?",
o:["Google","Apple","Microsoft","Meta"],
a:"Google"
},

{
q:"Which is not an OS?",
o:["Windows","Linux","Oracle","Android"],
a:"Oracle"
},

{
q:"Computer brain?",
o:["RAM","CPU","ROM","SSD"],
a:"CPU"
},

{
q:"National animal of India?",
o:["Tiger","Lion","Elephant","Horse"],
a:"Tiger"
},

{
q:"Which tag creates a link?",
o:["a","p","h1","img"],
a:"a"
},

{
q:"Firebase is used for?",
o:[
"Backend",
"Game",
"Browser",
"Keyboard"
],
a:"Backend"
}

];

let current = 0;
let score = 0;

function startQuiz(){

const name =
document.getElementById("playerName").value;

if(name===""){
alert("Enter Name");
return;
}

document.getElementById("quizBox").style.display="block";

showQuestion();
}

function showQuestion(){

let q = questions[current];

document.getElementById("question").innerText=q.q;

let html="";

q.o.forEach(opt=>{

html+=`
<button class="option"
onclick="checkAnswer('${opt}')">
${opt}
</button>
`;

});

document.getElementById("options").innerHTML=html;
}

window.checkAnswer=function(ans){

if(ans===questions[current].a){
score++;
}

}

window.nextQuestion=function(){

current++;

if(current<questions.length){

showQuestion();

}else{

finishQuiz();

}

}

async function finishQuiz(){

let name=
document.getElementById("playerName").value;

document.getElementById("quizBox").style.display="none";

document.getElementById("result").innerHTML=
`Your Score: ${score}/20`;

await addDoc(collection(db,"scores"),{

name:name,

score:score

});

loadLeaderboard();
}

async function loadLeaderboard(){

const q=query(
collection(db,"scores"),
orderBy("score","desc"),
limit(10)
);

const snapshot=await getDocs(q);

let html="";

snapshot.forEach(doc=>{

let data=doc.data();

html+=`
<li>
${data.name} - ${data.score}
</li>
`;

});

document.getElementById("leaderboardList").innerHTML=html;
}

loadLeaderboard();

</script>

</body>
</html>

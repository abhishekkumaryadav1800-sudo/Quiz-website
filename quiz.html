<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Master</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(-45deg,#0f0c29,#302b63,#24243e,#ff416c);
    background-size:400% 400%;
    animation:bg 10s ease infinite;
    padding:20px;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.quiz-box{
    width:100%;
    max-width:800px;
    padding:30px;
    border-radius:20px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
    text-align:center;
    color:white;
    box-shadow:0 0 30px rgba(255,255,255,0.2);
}

h1{
    margin-bottom:20px;
    text-shadow:0 0 15px cyan;
}

#question{
    font-size:24px;
    margin-bottom:25px;
}

.option{
    width:100%;
    padding:15px;
    margin:10px 0;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-size:16px;
    color:white;
    background:linear-gradient(45deg,#00c6ff,#0072ff);
    transition:0.3s;
}

.option:hover{
    transform:scale(1.03);
}

.loading{
    font-size:22px;
}

.loader{
    width:60px;
    height:60px;
    border:6px solid rgba(255,255,255,0.2);
    border-top:6px solid cyan;
    border-radius:50%;
    margin:20px auto;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}
</style>
</head>
<body>

<div class="quiz-box">
    <div id="loading">
        <h1 class="loading">Loading Questions...</h1>
        <div class="loader"></div>
    </div>

    <div id="quiz" style="display:none;">
        <h1>Quiz Master 🚀</h1>
        <div id="score">🏆 Score: 0</div>
        <div id="question"></div>
        <div id="options"></div>
    </div>
</div>

<script>
let score = 0;
let currentQuestion = {};

async function loadQuiz() {

    document.getElementById("question").innerHTML = "Loading...";

    const response = await fetch(
        "https://opentdb.com/api.php?amount=1&type=multiple"
    );

    const data = await response.json();
    const q = data.results[0];

    currentQuestion = q;

    document.getElementById("question").innerHTML = q.question;

    let answers = [...q.incorrect_answers];
    answers.push(q.correct_answer);

    answers.sort(() => Math.random() - 0.5);

    let html = "";

    answers.forEach(answer => {
        html += `
        <button class="option"
        onclick="checkAnswer(this,'${answer.replace(/'/g,"\\'")}')">
        ${answer}
        </button>
        `;
    });

    html += `
    <br><br>
    <button id="nextBtn" onclick="loadQuiz()" style="display:none;">
        Next Question ➜
    </button>
    `;

    document.getElementById("options").innerHTML = html;

    updateScore();
}

function checkAnswer(btn, answer){

    const buttons = document.querySelectorAll(".option");

    buttons.forEach(b => b.disabled = true);

    if(answer === currentQuestion.correct_answer){
        btn.style.background = "green";
        score++;
    }else{
        btn.style.background = "red";

        buttons.forEach(b=>{
            if(b.innerText === currentQuestion.correct_answer){
                b.style.background = "green";
            }
        });
    }

    document.getElementById("nextBtn").style.display = "inline-block";

    updateScore();
}

function updateScore(){
    document.getElementById("score").innerHTML =
        "🏆 Score: " + score;
}

window.onload = loadQuiz;
</script>

</body>
</html>
